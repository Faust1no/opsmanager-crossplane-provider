apiVersion: opsmanager.crossplane.io/v1alpha1
kind: S3OplogStore
metadata:
  name: shared-oplog-store
spec:
  providerConfigRef:
    name: default
  forProvider:
    # ID is the store identifier in Ops Manager (Admin → Backup → Oplog Stores).
    # Used for adoption of an existing store.
    id: "shared-oplog-store"
    uri: "mongodb://mongodb-ops-manager:1zJ_-ws4TGAq@ops-manager-db-0.ops-manager-db-svc.mongodb.svc.cluster.local:27017,ops-manager-db-1.ops-manager-db-svc.mongodb.svc.cluster.local:27017,ops-manager-db-2.ops-manager-db-svc.mongodb.svc.cluster.local:27017/?authMechanism=SCRAM-SHA-256&authSource=admin&replicaSet=ops-manager-db"
    s3BucketEndpoint: "http://minio.minio.svc.cluster.local:9000"
    s3BucketName: "ops-manager-oplog"
    s3AuthMethod: KEYS
    awsAccessKey: "minioadmin"
    awsSecretKeySecretRef:
      namespace: crossplane-system
      name: minio-credentials
      key: secretKey
    pathStyleAccessEnabled: true
    acceptedTos: true
    sseEnabled: false
    assignmentEnabled: true
    # Labels are appended per cluster so their oplogs route here.
    # Add each new cluster's label alongside existing ones.
    labels:
      - "test-rs"
