apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: crossplane-system
type: Opaque
stringData:
  # MinIO root credentials from your Makefile
  secretKey: "minioadmin123"
---
apiVersion: opsmanager.crossplane.io/v1alpha1
kind: S3Blockstore
metadata:
  name: minio-blockstore
spec:
  providerConfigRef:
    name: default
  forProvider:
    id: "minio-blockstore"
    # uri is the MongoDB connection string Ops Manager uses to track snapshot metadata.
    # Use your Ops Manager backing database URI, e.g.:
    #   mongodb://ops-manager-db-0.ops-manager-db-svc.mongodb.svc.cluster.local:27017
    # Or any reachable MongoDB URI in your cluster.
    uri: "mongodb://mongodb-ops-manager:1zJ_-ws4TGAq@ops-manager-db-0.ops-manager-db-svc.mongodb.svc.cluster.local:27017,ops-manager-db-1.ops-manager-db-svc.mongodb.svc.cluster.local:27017,ops-manager-db-2.ops-manager-db-svc.mongodb.svc.cluster.local:27017/?authMechanism=SCRAM-SHA-256&authSource=admin&replicaSet=ops-manager-db"
    # MinIO is exposed on NodePort 30090 in your kind cluster.
    # Ops Manager backup daemon runs inside the cluster, so it reaches
    # MinIO via the in-cluster service name, not localhost.
    # Replace with the actual MinIO service DNS if different.
    s3BucketEndpoint: "http://minio.minio.svc.cluster.local:9000"
    s3BucketName: "ops-manager-blockstore"
    s3AuthMethod: KEYS
    awsAccessKey: "minioadmin"
    awsSecretKeySecretRef:
      namespace: crossplane-system
      name: minio-credentials
      key: secretKey
    # This label must match the assignmentLabels on your MongoDB cluster CR.
    labels:
      - "my-cluster"
    assignmentEnabled: true
    pathStyleAccessEnabled: true   # required for MinIO
    acceptedTos: true
    sseEnabled: false
