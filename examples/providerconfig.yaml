apiVersion: v1
kind: Secret
metadata:
  name: opsmanager-credentials
  namespace: crossplane-system
type: Opaque
stringData:
  # Programmatic API Key created in Ops Manager:
  # Organization → Access Manager → API Keys → Create API Key
  publicKey: "zzyvpeed"
  privateKey: "7db8b321-3b61-4c68-9f2b-dff96f835623"
---
apiVersion: opsmanager.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
spec:
  # Ops Manager is exposed on NodePort 32001 in your kind cluster.
  # The provider runs on the host, so it reaches it via localhost.
  baseURL: "http://localhost:32001/"
  credentials:
    source: Secret
    publicKeySecretRef:
      namespace: crossplane-system
      name: opsmanager-credentials
      key: publicKey
    privateKeySecretRef:
      namespace: crossplane-system
      name: opsmanager-credentials
      key: privateKey
