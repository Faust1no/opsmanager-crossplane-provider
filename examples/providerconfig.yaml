# ClusterProviderConfig — cluster-scoped, referenced by managed resources in any
# namespace via providerConfigRef: { kind: ClusterProviderConfig, name: default }.
# Use this when one Ops Manager instance is shared across the whole cluster.
apiVersion: v1
kind: Secret
metadata:
  name: opsmanager-credentials
  namespace: crossplane-system
type: Opaque
stringData:
  # Programmatic API Key created in Ops Manager:
  # Organization → Access Manager → API Keys → Create API Key
  publicKey: "zzyvpeed"
  privateKey: "7db8b321-3b61-4c68-9f2b-dff96f835623"
---
apiVersion: opsmanager.crossplane.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: default
spec:
  # Ops Manager is exposed on NodePort 32001 in your kind cluster.
  # The provider runs on the host, so it reaches it via localhost.
  baseURL: "http://localhost:32001/"
  credentials:
    source: Secret
    publicKeySecretRef:
      namespace: crossplane-system
      name: opsmanager-credentials
      key: publicKey
    privateKeySecretRef:
      namespace: crossplane-system
      name: opsmanager-credentials
      key: privateKey
---
# ProviderConfig — namespace-scoped. Only managed resources in the same
# namespace can reference it. Use this when different tenants/namespaces should
# target different Ops Manager instances.
#
# A namespace-scoped managed resource references it with
#   providerConfigRef:
#     kind: ProviderConfig
#     name: tenant-a
# and the ProviderConfig must live in the same namespace as the managed resource.
# Cluster-scoped managed resources (BackupDaemon) cannot reference a
# namespace-scoped ProviderConfig — use ClusterProviderConfig for those.
apiVersion: opsmanager.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: tenant-a
  namespace: tenant-a
spec:
  baseURL: "http://opsmanager.tenant-a.svc.cluster.local:8080/"
  credentials:
    source: Secret
    publicKeySecretRef:
      namespace: tenant-a
      name: opsmanager-credentials
      key: publicKey
    privateKeySecretRef:
      namespace: tenant-a
      name: opsmanager-credentials
      key: privateKey
