    - crossplane
    kind: BackupDaemon
    listKind: BackupDaemonList
    plural: backupdaemons
    singular: backupdaemon
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
