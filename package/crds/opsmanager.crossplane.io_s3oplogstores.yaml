---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: s3oplogstores.opsmanager.crossplane.io
spec:
  group: opsmanager.crossplane.io
  names:
    categories:
    - crossplane
    kind: S3OplogStore
    listKind: S3OplogStoreList
    plural: s3oplogstores
    singular: s3oplogstore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    - jsonPath: .spec.forProvider.s3BucketName
      name: BUCKET
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          S3OplogStore is a managed resource representing an S3-backed oplog store
          in MongoDB Ops Manager. In a multi-cluster setup this store is typically shared —
          each new cluster appends its label so its oplogs are routed here.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: S3OplogStoreSpec defines the desired state of an S3OplogStore.
            properties:
              forProvider:
                description: |-
                  S3OplogStoreParameters mirrors the fields of the SDK's S3Blockstore struct
                  as used by the oplog S3 store endpoint. The API shape is identical to the
                  snapshot blockstore — only the endpoint differs.
                properties:
                  acceptedTos:
                    description: AcceptedTos indicates acceptance of the S3 terms
                      of service.
                    type: boolean
                  assignmentEnabled:
                    default: true
                    description: AssignmentEnabled controls whether this store accepts
                      new backup assignments.
                    type: boolean
                  awsAccessKey:
                    description: AWSAccessKey is the AWS access key ID. Required when
                      S3AuthMethod is KEYS.
                    type: string
                  awsSecretKeySecretRef:
                    description: |-
                      AWSSecretKeySecretRef references a Kubernetes Secret containing the AWS secret
                      access key. Required when S3AuthMethod is KEYS.
                    properties:
                      key:
                        description: The key to select.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  disableProxyS3:
                    description: DisableProxyS3 disables proxy usage for S3 connections.
                    type: boolean
                  encryptedCredentials:
                    description: EncryptedCredentials indicates whether the credentials
                      are encrypted.
                    type: boolean
                  id:
                    description: ID is the unique identifier for this S3 oplog store
                      in Ops Manager.
                    minLength: 1
                    type: string
                  labels:
                    description: |-
                      Labels are the assignment labels for this oplog store.
                      Backup jobs whose cluster assignmentLabels match will have their oplogs routed here.
                    items:
                      type: string
                    type: array
                  loadFactor:
                    description: LoadFactor is the relative weight for backup job
                      distribution across stores.
                    format: int64
                    type: integer
                  maxCapacityGB:
                    description: MaxCapacityGB is the maximum storage capacity for
                      this store in GB.
                    format: int64
                    type: integer
                  pathStyleAccessEnabled:
                    description: |-
                      PathStyleAccessEnabled enables path-style S3 URLs.
                      Required for non-AWS S3-compatible endpoints.
                    type: boolean
                  provisioned:
                    description: Provisioned indicates whether the store has been
                      provisioned.
                    type: boolean
                  s3AuthMethod:
                    default: KEYS
                    description: S3AuthMethod controls how the backup agent authenticates
                      to S3.
                    enum:
                    - KEYS
                    - IAM_ROLE
                    type: string
                  s3BucketEndpoint:
                    description: S3BucketEndpoint is the S3-compatible endpoint URL.
                    minLength: 1
                    type: string
                  s3BucketName:
                    description: S3BucketName is the name of the S3 bucket used for
                      oplog storage.
                    minLength: 1
                    type: string
                  s3MaxConnections:
                    description: S3MaxConnections is the maximum number of concurrent
                      S3 connections.
                    format: int64
                    type: integer
                  sseEnabled:
                    description: SSEEnabled enables server-side encryption on the
                      S3 bucket.
                    type: boolean
                  ssl:
                    description: SSL enables SSL for the connection to the store.
                    type: boolean
                  syncSource:
                    description: SyncSource is the source for syncing the store.
                    type: string
                  uri:
                    description: URI is the connection string for the store's MongoDB
                      process (if applicable).
                    type: string
                  username:
                    description: Username for authentication to the store.
                    type: string
                  writeConcern:
                    description: WriteConcern is the write concern for the store.
                    type: string
                required:
                - id
                - s3AuthMethod
                - s3BucketEndpoint
                - s3BucketName
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: S3OplogStoreStatus defines the observed state of an S3OplogStore.
            properties:
              atProvider:
                description: S3OplogStoreObservation holds read-only state returned
                  by the Ops Manager API.
                properties:
                  usedSize:
                    description: UsedSize is the storage currently consumed by this
                      oplog store in bytes.
                    format: int64
                    type: integer
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
